<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>夏聪 · 作品集</title>
<style>
  * { margin:0; padding:0; box-sizing: border-box; }
  body { font-family: 'Noto Sans SC', 'Microsoft YaHei', sans-serif; background: #f8f6f1; color: #2c2c2c; min-height: 100vh; }
  .hero { background: linear-gradient(135deg, #2c2416 0%, #3d3222 50%, #4a3d28 100%); color: #e8dcc8; padding: 48px 40px 36px; text-align: center; position: relative; overflow: hidden; }
  .hero::before { content: ''; position: absolute; top: -60px; right: -60px; width: 200px; height: 200px; border: 1px solid rgba(184,148,90,.15); border-radius: 50%; }
  .hero-name { font-family: 'Noto Serif SC', serif; font-size: 32px; letter-spacing: 8px; color: #fff; margin-bottom: 6px; }
  .hero-title { font-size: 13px; letter-spacing: 4px; color: #b8945a; opacity: .85; }
  .hero-line { display: flex; align-items: center; justify-content: center; gap: 12px; margin-top: 20px; }
  .hero-line span { width: 32px; height: 1px; background: rgba(184,148,90,.35); }
  .hero-line b { font-size: 11px; color: #b8945a; letter-spacing: 3px; font-weight: 400; opacity: .7; }
  .nav { display: flex; justify-content: center; gap: 0; background: #fff; border-bottom: 1px solid rgba(184,148,90,.15); padding: 0 24px; position: sticky; top: 0; z-index: 10; }
  .nav-btn { font-size: 12.5px; letter-spacing: 2px; color: #888; padding: 14px 22px; cursor: pointer; border-bottom: 2px solid transparent; transition: all .25s; background: none; border-top: none; border-left: none; border-right: none; }
  .nav-btn:hover { color: #8a6c3c; }
  .nav-btn.active { color: #8a6c3c; border-bottom-color: #b8945a; font-weight: 600; }
  .container { max-width: 980px; margin: 0 auto; padding: 28px 24px 56px; }
  .sec-title { font-family: 'Noto Serif SC', serif; font-size: 16px; letter-spacing: 4px; color: #333; margin-bottom: 18px; padding-left: 14px; border-left: 3px solid #b8945a; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 12px; }
  .grid-item { background: #fff; border: 1px solid rgba(184,148,90,.12); border-radius: 4px; overflow: hidden; transition: transform .25s, box-shadow .25s; cursor: pointer; }
  .grid-item:hover { transform: translateY(-3px); box-shadow: 0 8px 24px rgba(140,108,60,.12); }
  .grid-item img { width: 100%; aspect-ratio: 16/9; object-fit: cover; display: block; }
  .grid-item .caption { font-size: 11px; color: #999; padding: 6px 10px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; letter-spacing: .5px; }
  .video-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }
  .video-card { background: #fff; border: 1px solid rgba(184,148,90,.12); border-radius: 6px; overflow: hidden; transition: transform .25s; cursor: pointer; }
  .video-card:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(140,108,60,.1); }
  .video-thumb { width: 100%; aspect-ratio: 16/9; background: linear-gradient(135deg, #2c2416, #4a3d28); position: relative; overflow: hidden; }
  .play-icon { width: 48px; height: 48px; border-radius: 50%; background: rgba(255,255,255,.9); display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 12px rgba(0,0,0,.15); position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); transition: opacity .2s; }
  .play-icon::after { content: ''; border-style: solid; border-width: 10px 0 10px 17px; border-color: transparent transparent transparent #b8945a; margin-left: 4px; }
  .video-card:hover .play-icon { opacity: 1; }
  .video-info { padding: 12px 14px; }
  .video-name { font-size: 12.5px; color: #333; margin-bottom: 4px; letter-spacing: .5px; }
  .video-size { font-size: 10.5px; color: #bbb; }

  /* 图片 Lightbox */
  .lightbox { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,.88); z-index: 999; align-items: center; justify-content: center; }
  .lightbox.show { display: flex; }
  .lightbox img { max-width: 92%; max-height: 88vh; object-fit: contain; border-radius: 4px; }
  .lightbox-close { position: absolute; top: 20px; right: 24px; font-size: 28px; color: #fff; cursor: pointer; opacity: .7; background: none; border: none; z-index: 10; }
  .lightbox-close:hover { opacity: 1; }

  /* 视频 Lightbox */
  .vlb { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,.92); z-index: 1000; align-items: center; justify-content: center; flex-direction: column; }
  .vlb.show { display: flex; }
  .vlb-video-wrap { width: 90%; max-width: 900px; border-radius: 8px; overflow: hidden; box-shadow: 0 20px 60px rgba(0,0,0,.5); }
  .vlb-video-wrap video { width: 100%; display: block; background: #000; outline: none; }
  .vlb-title { color: #e8dcc8; font-size: 13px; letter-spacing: 2px; margin-top: 14px; opacity: .85; }
  .vlb-close { position: absolute; top: 18px; right: 22px; width: 40px; height: 40px; border-radius: 50%; background: rgba(255,255,255,.12); border: 1px solid rgba(255,255,255,.2); color: #fff; font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background .2s; z-index: 10; }
  .vlb-close:hover { background: rgba(255,255,255,.25); }

  .footer { text-align: center; padding: 24px; font-size: 10px; color: #ccc; letter-spacing: 2px; border-top: 1px solid rgba(184,148,90,.1); }
  @media(max-width:600px) { .grid { grid-template-columns: repeat(2,1fr); } .video-grid { grid-template-columns: 1fr; } .hero-name { font-size: 24px; } .vlb-video-wrap { width: 96%; max-width: 100%; } }
</style>
</head>
<body>

<div class="hero">
  <div class="hero-name">XIA CONG</div>
  <div class="hero-title">新媒体运营 · 内容策划</div>
  <div class="hero-line"><span></span><b>PORTFOLIO</b><span></span></div>
</div>

<div class="nav" id="nav">
  <button class="nav-btn active" onclick="switchTab('accounts', this)">账号资料</button>
  <button class="nav-btn" onclick="switchTab('videos', this)">视频作品</button>
</div>

<div class="container">
  <section id="tab-accounts">
    <div class="sec-title">账号运营成果截图</div>
    <div class="grid" id="accountGrid"></div>
  </section>
  <section id="tab-videos" style="display:none;">
    <div class="sec-title">部分视频作品</div>
    <div class="video-grid" id="videoGrid"></div>
  </section>
</div>

<div class="footer">XIA CONG · PORTFOLIO © 2026</div>

<!-- 图片 Lightbox -->
<div class="lightbox" id="lb" onclick="closeLb()">
  <button class="lightbox-close">&times;</button>
  <img id="lbImg" src="" alt="">
</div>

<!-- 视频 Lightbox -->
<div class="vlb" id="vlb" onclick="if(event.target===this)closeVlb()">
  <button class="vlb-close" onclick="closeVlb()">&times;</button>
  <div class="vlb-video-wrap">
    <video id="vlbVideo" controls preload="none"></video>
  </div>
  <div class="vlb-title" id="vlbTitle"></div>
</div>

<script>
const accountNames = [
  '账号截图 01','账号截图 02','账号截图 03','账号截图 04',
  '账号截图 05','账号截图 06','账号截图 07','账号截图 08',
  '账号截图 09','账号截图 10','账号截图 11','账号截图 12',
  '账号截图 13','账号截图 14','账号截图 15','账号截图 16',
  '账号截图 17','账号截图 18','账号截图 19',
  '账号截图 20','账号截图 21','账号截图 22',
  '账号截图 24','账号截图 25','账号截图 26',
  '账号截图 27','账号截图 28','账号截图 29',
  '账号截图 30','账号截图 31','账号截图 32',
  'CRM系统 01','CRM系统 02','CRM系统 03','CRM系统 04','CRM系统 05'
];
const imagePaths = [
  '部分账号资料/1.jpg','部分账号资料/2.jpg','部分账号资料/3.jpg','部分账号资料/4.jpg',
  '部分账号资料/5.jpg','部分账号资料/6.jpg','部分账号资料/7.jpg','部分账号资料/8.jpg',
  '部分账号资料/9.jpg','部分账号资料/10.jpg','部分账号资料/11.jpg','部分账号资料/12.jpg',
  '部分账号资料/13.jpg','部分账号资料/14.jpg','部分账号资料/15.jpg','部分账号资料/16.jpg',
  '部分账号资料/17.jpg','部分账号资料/18.jpg','部分账号资料/19.jpg',
  '部分账号资料/20.jpg','部分账号资料/21.jpg','部分账号资料/22.jpg',
  '部分账号资料/24.jpg','部分账号资料/25.jpg','部分账号资料/26.jpg',
  '部分账号资料/27.jpg','部分账号资料/28.jpg','部分账号资料/29.jpg',
  '部分账号资料/30.png','部分账号资料/31.png','部分账号资料/32.png',
  '部分账号资料/自己开发的新媒体客户管理系统01.png',
  '部分账号资料/自己开发的新媒体客户管理系统02.png',
  '部分账号资料/自己开发的新媒体客户管理系统03.png',
  '部分账号资料/自己开发的新媒体客户管理系统04.png',
  '部分账号资料/自己开发的新媒体客户管理系统05.png'
];

function renderAccounts() {
  const g = document.getElementById('accountGrid');
  accountNames.forEach((name, i) => {
    const d = document.createElement('div');
    d.className = 'grid-item';
    d.innerHTML = `<img src="${imagePaths[i]}" alt="${name}" loading="lazy"><div class="caption">${name}</div>`;
    d.onclick = () => openLb(imagePaths[i]);
    g.appendChild(d);
  });
}

const videos = [
  { name: '五粮宣传片',   file: 'wu-liang.mp4',                  size: '48.5 MB' },
  { name: '健身房宣传',   file: 'gym.mp4',                          size: '95.0 MB' },
  { name: '家装宣传片',   file: 'home-decor.mp4',                   size: '96.6 MB' },
  { name: '晚会记录',     file: 'gala-event.mp4',                   size: '85.1 MB' },
  { name: '珠宝赛道',     file: 'jewelry.mp4',                     size: '74.0 MB' },
  { name: '降噪耳机宣传', file: 'noise-canceling-headphones.mp4', size: '52.1 MB' },
];
const BASE = 'https://ghproxy.com/https://github.com/xiat93569-afk/portfolio/releases/download/videos/';
let videosRendered = false;

function renderVideos() {
  if (videosRendered) return;
  const g = document.getElementById('videoGrid');
  videos.forEach(v => {
    const url = BASE + v.file;
    const d = document.createElement('div');
    d.className = 'video-card';
    d.innerHTML = `
      <div class="video-thumb">
        <video src="${url}" preload="metadata" muted style="width:100%;height:100%;object-fit:cover;position:absolute;top:0;left:0;border-radius:4px 4px 0 0;"></video>
        <div class="play-icon"></div>
      </div>
      <div class="video-info">
        <div class="video-name">${v.name}</div>
        <div class="video-size">${v.size}</div>
      </div>`;
    d.onclick = () => openVlb(v.name, url);
    g.appendChild(d);
  });
  videosRendered = true;
}

function switchTab(tab, btn) {
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('tab-accounts').style.display = tab === 'accounts' ? '' : 'none';
  document.getElementById('tab-videos').style.display = tab === 'videos' ? '' : 'none';
  if (tab === 'videos') renderVideos();
}

/* 图片 Lightbox */
function openLb(src) {
  document.getElementById('lbImg').src = src;
  document.getElementById('lb').classList.add('show');
}
function closeLb() { document.getElementById('lb').classList.remove('show'); }

/* 视频 Lightbox */
let currentVlbVideo = null;
function openVlb(name, url) {
  const vlb = document.getElementById('vlb');
  const v = document.getElementById('vlbVideo');
  // 停止之前的视频
  if (currentVlbVideo && currentVlbVideo !== v) { currentVlbVideo.pause(); }
  v.src = url;
  vlb.classList.add('show');
  document.getElementById('vlbTitle').textContent = name;
  currentVlbVideo = v;
  v.play().catch(() => {});
}
function closeVlb() {
  const vlb = document.getElementById('vlb');
  vlb.classList.remove('show');
  const v = document.getElementById('vlbVideo');
  v.pause();
  v.src = '';
  currentVlbVideo = null;
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    closeLb();
    closeVlb();
  }
});

renderAccounts();
</script>
</body>
</html>
